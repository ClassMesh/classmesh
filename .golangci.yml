# golangci-lint v2 configuration.
#
# A curated set: bug-catchers (errcheck, staticcheck, ineffassign, unused,
# errorlint, copyloopvar) plus a few low-noise hygiene linters (misspell,
# nolintlint) — strict enough to catch real defects without style churn.

version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - unused
    - gocritic
    - errorlint
    - copyloopvar
    - misspell
    - nolintlint
  exclusions:
    generated: strict
    paths:
      - bin/

formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: strict
    paths:
      - bin/

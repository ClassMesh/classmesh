name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref == 'refs/heads/main' && github.run_id || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  GO_VERSION: "1.25.x"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum
      - name: Verify module checksums
        run: go mod verify
      - name: Tidy drift check
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum
      - name: External identity proof from clean caches
        env:
          GOCACHE: ${{ runner.temp }}/classmesh-proof-build
          GOMODCACHE: ${{ runner.temp }}/classmesh-proof-mod
          GOFLAGS: ""
          GOWORK: "off"
        run: |
          go test -count=1 -run 'Test(DependencyMatrix|ExternalConsumerFixture|InternalPackageBoundary|MinimalConsumerLinkage)$' .
          go test -count=1 -run TestCLIGoldens ./internal/cli
      - name: Vet
        run: go vet ./...
      - name: Build (cgo-free) and assert static linking
        run: make cgo-check
      - name: Test with coverage
        run: go test -race -count=1 -coverprofile=coverage.out -covermode=atomic ./...
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          args: --config=${{ github.workspace }}/.golangci.yml

  vuln:
    name: Vulnerabilities
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.5.0
      - name: Scan module
        run: govulncheck ./...

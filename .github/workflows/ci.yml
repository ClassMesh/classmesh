name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GO_VERSION: "1.25.x"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: shared/go.sum
      - name: Verify module checksums
        run: make verify
      - name: Vet
        run: make vet
      - name: Build (cgo-free) and assert static linking
        run: make cgo-check
      - name: Test with coverage
        run: make coverage
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  lint:
    name: Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: [shared, services/cli]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.8.0
          working-directory: ${{ matrix.module }}
          args: --config=${{ github.workspace }}/.golangci.yml
          only-new-issues: true
